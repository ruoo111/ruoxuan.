<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>悠游假期 | 携程风格旅行首页 - 精选旅行团</title>
    <!-- 引入Google Fonts提升字体质感 -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <!-- Font Awesome 6 免费图标库 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #1e293b;
            line-height: 1.5;
        }

        /* 主容器 */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ========= 头部导航 (类似携程风格，简洁大气) ========= */
        .header {
            background-color: white;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.04);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #1e88e5, #ff8a5c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .logo i {
            background: none;
            -webkit-background-clip: unset;
            color: #ff8a5c;
            margin-right: 4px;
        }

        .nav-links {
            display: flex;
            gap: 32px;
            font-weight: 500;
        }

        .nav-links a {
            text-decoration: none;
            color: #334155;
            transition: color 0.2s;
            font-size: 0.95rem;
        }

        .nav-links a:hover, .nav-links a.active {
            color: #1e88e5;
        }

        .nav-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-right i {
            font-size: 1.2rem;
            color: #5b6e8c;
            cursor: pointer;
            transition: color 0.2s;
        }

        .nav-right i:hover {
            color: #1e88e5;
        }

        .btn-outline {
            border: 1px solid #1e88e5;
            background: transparent;
            padding: 6px 18px;
            border-radius: 40px;
            color: #1e88e5;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-outline:hover {
            background: #1e88e5;
            color: white;
        }

        /* ========= Hero 区域 (风景大图 + 搜索条，强化旅行氛围) ========= */
        .hero {
            background: linear-gradient(0deg, rgba(0,0,0,0.3), rgba(0,0,0,0.2)), url('https://images.pexels.com/photos/1488465/pexels-photo-1488465.jpeg?auto=compress&cs=tinysrgb&w=1600') center/cover no-repeat;
            min-height: 460px;
            border-radius: 0 0 36px 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            margin-bottom: 56px;
        }

        .hero-content {
            text-align: center;
            color: white;
            padding: 20px;
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 3.2rem;
            font-weight: 800;
            text-shadow: 0 2px 12px rgba(0,0,0,0.3);
            margin-bottom: 16px;
            letter-spacing: -0.3px;
        }

        .hero-content p {
            font-size: 1.2rem;
            margin-bottom: 32px;
            opacity: 0.95;
            font-weight: 400;
        }

        .search-card {
            background: rgba(255,255,255,0.94);
            backdrop-filter: blur(8px);
            border-radius: 56px;
            padding: 8px 12px 8px 24px;
            display: inline-flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: center;
            box-shadow: 0 20px 30px -10px rgba(0,0,0,0.2);
        }

        .search-card input, .search-card button {
            border: none;
            background: white;
            padding: 12px 22px;
            border-radius: 48px;
            font-size: 16px;
            outline: none;
        }

        .search-card input {
            width: 280px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.05);
        }

        .search-card button {
            background: #1e88e5;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-card button:hover {
            background: #0b5e8a;
        }

        /* ========= 热门推荐区域 (三个核心旅行团) ========= */
        .section-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .section-header h2 {
            font-size: 28px;
            font-weight: 700;
            position: relative;
            display: inline-block;
        }

        .section-header h2:after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            width: 48px;
            height: 3px;
            background: #ff8a5c;
            border-radius: 4px;
        }

        .section-header a {
            color: #1e88e5;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
        }

        /* 三列卡片网格 - 重点突出三个旅行团 */
        .triple-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 64px;
        }

        /* 旅行团卡片样式 (精美阴影+圆角) */
        .tour-card {
            background: white;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.08);
            transition: transform 0.25s ease, box-shadow 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }

        .tour-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.12);
        }

        .card-img {
            height: 220px;
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* 促销/特价标签 */
        .card-tag {
            position: absolute;
            top: 16px;
            left: 16px;
            background: #ff6b4a;
            color: white;
            font-size: 12px;
            font-weight: 800;
            padding: 5px 14px;
            border-radius: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            letter-spacing: 0.5px;
        }

        .card-content {
            padding: 20px 20px 22px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
        }

        .price {
            color: #ff6b4a;
            font-weight: 800;
            font-size: 1.6rem;
            line-height: 1;
        }

        .price small {
            font-size: 0.8rem;
            font-weight: 500;
            color: #6c7a89;
        }

        /* 时长 & 其他信息行 */
        .info-row {
            display: flex;
            gap: 20px;
            margin: 12px 0 12px;
            font-size: 0.9rem;
            color: #4b5563;
            flex-wrap: wrap;
        }

        .info-row i {
            width: 18px;
            color: #1e88e5;
            margin-right: 5px;
        }

        /* 住宿条件标签 */
        .accommodation {
            background: #f1f5f9;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #1e293b;
            width: fit-content;
            margin: 6px 0 8px;
        }

        .accommodation i {
            font-size: 0.8rem;
            color: #1e88e5;
        }

        .card-footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #eef2f6;
            padding-top: 16px;
        }

        .rating {
            color: #f5b042;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .btn-book {
            background: none;
            border: 1.5px solid #1e88e5;
            padding: 8px 20px;
            border-radius: 40px;
            color: #1e88e5;
            font-weight: 700;
            font-size: 0.8rem;
            transition: 0.2s;
            cursor: pointer;
        }

        .btn-book:hover {
            background: #1e88e5;
            color: white;
        }

        /* 风景展示&住宿推荐副区域（增强旅行灵感） */
        .inspire-section {
            background: #ffffff;
            border-radius: 32px;
            padding: 32px 28px;
            margin: 24px 0 56px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.03);
        }

        .inspire-title {
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .inspire-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .scene-card {
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            height: 170px;
            background-size: cover;
            background-position: center;
            transition: transform 0.2s;
            cursor: pointer;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }

        .scene-card:hover {
            transform: scale(0.98);
        }

        .scene-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.7), transparent);
            padding: 12px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* 底部 footer */
        footer {
            background: #0f172a;
            color: #cbd5e6;
            padding: 48px 0 24px;
            border-radius: 32px 32px 0 0;
            margin-top: 40px;
        }

        .footer-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 40px;
        }

        .copyright {
            text-align: center;
            margin-top: 40px;
            font-size: 0.75rem;
            opacity: 0.6;
        }

        /* 响应式 */
        @media (max-width: 980px) {
            .triple-grid {
                grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
                gap: 24px;
            }
            .inspire-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 720px) {
            .nav-bar {
                flex-direction: column;
                gap: 12px;
            }
            .hero-content h1 {
                font-size: 2rem;
            }
            .search-card {
                flex-direction: column;
                background: rgba(0,0,0,0.65);
                border-radius: 36px;
                padding: 16px;
            }
            .search-card input, .search-card button {
                width: 100%;
            }
            .section-header h2 {
                font-size: 1.8rem;
            }
            .inspire-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="nav-bar">
            <div class="logo"><i class="fas fa-plane-departure"></i> 悠游假期</div>
            <div class="nav-links">
                <a href="#" class="active">首页</a>
                <a href="#">旅行团</a>
                <a href="#">自由行</a>
                <a href="#">酒店·民宿</a>
                <a href="#">目的地攻略</a>
            </div>
            <div class="nav-right">
                <i class="fas fa-search"></i>
                <i class="far fa-heart"></i>
                <i class="far fa-user-circle"></i>
                <button class="btn-outline">登录 / 注册</button>
            </div>
        </div>
    </div>
</header>

<!-- 英雄区：风景图和搜索框，呼应旅行主题 -->
<section class="hero">
    <div class="hero-content">
        <h1>奔赴山海，不负热爱</h1>
        <p>精选优质跟团游 | 透明价格 · 星级住宿 · 绝美风光</p>
        <div class="search-card">
            <input type="text" placeholder="🔍 想去哪里？输入目的地或旅行团" id="searchInput">
            <button id="searchBtn">搜索团期</button>
        </div>
    </div>
</section>

<div class="container">
    <!-- 重点区域：展示三个核心旅行团，包含价格/时长/住宿/风景图 -->
    <div class="section-header">
        <h2>✨ 限时热推 · 精选跟团游</h2>
        <a href="#">查看全部行程 <i class="fas fa-arrow-right"></i></a>
    </div>

    <!-- 三个旅行团卡片动态渲染区域，确保每个卡片都包含价格、旅行时长、住宿条件、风景图 -->
    <div class="triple-grid" id="tourGrid">
        <!-- 三个旅行团将由js动态渲染，保证数据完整且美观 -->
    </div>

    <!-- 额外展示更多风景美图和优质住宿推荐，增强“住宿条件和风景”吸引力 -->
    <div class="inspire-section">
        <div class="inspire-title">
            <i class="fas fa-image" style="color:#ff8a5c;"></i> 精选风景与品质住宿 
            <span style="font-size: 0.85rem; font-weight: normal; margin-left: 12px;">推窗即景，安心入眠</span>
        </div>
        <div class="inspire-grid" id="inspireGallery">
            <!-- 动态渲染风景+住宿图片区，突出氛围 -->
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <div class="footer-grid">
            <div><h4><i class="fas fa-globe"></i> 悠游假期</h4><p>让每一段旅程都值得珍藏</p></div>
            <div><h4>关于我们</h4><p>品质旅行 · 7x24h 服务</p></div>
            <div><h4>客服中心</h4><p>📞 1010-8822</p><p>travel@youyou.com</p></div>
        </div>
        <div class="copyright">© 2025 悠游假期 | 灵感源自携程 | 所有价格、时长、住宿以实际出行团期为准</div>
    </div>
</footer>

<script>
    // ---------- 定义三个主要旅行团的数据，完全符合要求：包含价格、旅行时长、住宿条件、风景图 ----------
    const threeTours = [
        {
            id: 1,
            name: "【奢享云南】丽江·大理·香格里拉",
            price: 3980,
            duration: "7天6晚",
            accommodation: "五星级纳西庭院酒店 + 雪山观景房",
            image: "https://images.pexels.com/photos/1464679/pexels-photo-1464679.jpeg?auto=compress&cs=tinysrgb&w=800",
            rating: 4.9,
            tag: "明星同款",
            description: "玉龙雪山+普达措，高端纯玩"
        },
        {
            id: 2,
            name: "【海岛之恋】三亚·蜈支洲岛纯玩团",
            price: 2799,
            duration: "5天4晚",
            accommodation: "临海五星度假酒店·海景房+私人沙滩",
            image: "https://images.pexels.com/photos/1036657/pexels-photo-1036657.jpeg?auto=compress&cs=tinysrgb&w=800",
            rating: 4.8,
            tag: "爆款限时",
            description: "浮潜/海鲜大餐/免税店"
        },
        {
            id: 3,
            name: "【秘境川西】稻城亚丁+墨石公园",
            price: 4899,
            duration: "8天7晚",
            accommodation: "藏式轻奢民宿 + 四钻供氧酒店",
            image: "https://images.pexels.com/photos/2341830/pexels-photo-2341830.jpeg?auto=compress&cs=tinysrgb&w=800",
            rating: 4.9,
            tag: "深度体验",
            description: "从你的全世界路过"
        }
    ];

    // 额外风景和住宿美图 (用于展示更多的住宿条件和风景，强化页面旅游感)
    const inspireData = [
        { title: "丽江·金茂璞修", desc: "雪山景观房 | 含氧住宿", img: "https://images.pexels.com/photos/258154/pexels-photo-258154.jpeg?auto=compress&cs=tinysrgb&w=600", type: "住宿" },
        { title: "桂林阳朔·画山云舍", desc: "山水画卷无边泳池", img: "https://images.pexels.com/photos/1680300/pexels-photo-1680300.jpeg?auto=compress&cs=tinysrgb&w=600", type: "住宿" },
        { title: "稻城亚丁·牛奶海", desc: "蓝色星球最后一片净土", img: "https://images.pexels.com/photos/2663915/pexels-photo-2663915.jpeg?auto=compress&cs=tinysrgb&w=600", type: "风景" },
        { title: "新疆喀纳斯湖", desc: "神仙湾晨雾 · 童话世界", img: "https://images.pexels.com/photos/1677106/pexels-photo-1677106.jpeg?auto=compress&cs=tinysrgb&w=600", type: "风景" }
    ];

    // 渲染三个旅行团卡片（每个都包含价格、旅行时长、住宿条件、风景图）
    function renderThreeTours() {
        const gridContainer = document.getElementById('tourGrid');
        if (!gridContainer) return;
        
        const cardsHTML = threeTours.map(tour => `
            <div class="tour-card" data-id="${tour.id}">
                <div class="card-img" style="background-image: url('${tour.image}');">
                    <div class="card-tag">${tour.tag}</div>
                </div>
                <div class="card-content">
                    <div class="card-title">
                        <span>${tour.name}</span>
                        <span class="price">¥${tour.price.toLocaleString()}<small>起</small></span>
                    </div>
                    <!-- 旅行时长 -->
                    <div class="info-row">
                        <span><i class="far fa-calendar-alt"></i> 行程时长：${tour.duration}</span>
                        <span><i class="fas fa-star" style="color:#f5b042;"></i> ${tour.rating}</span>
                    </div>
                    <!-- 住宿条件 详细展示 -->
                    <div class="accommodation">
                        <i class="fas fa-hotel"></i> 住宿条件：${tour.accommodation}
                    </div>
                    <div class="info-row" style="margin-top: 6px;">
                        <span><i class="fas fa-map-marker-alt"></i> 目的地亮点</span>
                        <span>${tour.description.substring(0, 28)}</span>
                    </div>
                    <div class="card-footer">
                        <div class="rating"><i class="fas fa-thumbs-up"></i> 满意度 98%</div>
                        <button class="btn-book">立即预订</button>
                    </div>
                </div>
            </div>
        `).join('');
        
        gridContainer.innerHTML = cardsHTML;
    }

    // 渲染额外风景图和住宿区 (进一步突出住宿条件和风景)
    function renderInspireGallery() {
        const galleryContainer = document.getElementById('inspireGallery');
        if (galleryContainer) {
            const itemsHTML = inspireData.map(item => `
                <div class="scene-card" style="background-image: url('${item.img}');">
                    <div class="scene-overlay">
                        <i class="fas ${item.type === '住宿' ? 'fa-bed' : 'fa-mountain'}"></i> ${item.title}<br>
                        <span style="font-size: 0.7rem; opacity: 0.9;">${item.desc}</span>
                    </div>
                </div>
            `).join('');
            galleryContainer.innerHTML = itemsHTML;
        }
    }

    // 搜索功能（根据旅行团名称或目的地模拟搜索，对三个旅行团实时筛选）
    const searchBtn = document.getElementById('searchBtn');
    const searchInput = document.getElementById('searchInput');
    
    function filterToursByKeyword(keyword) {
        if (!keyword.trim()) {
            // 无关键词则展示原始三个旅行团
            renderThreeTours();
            return;
        }
        const lowerKeyword = keyword.toLowerCase();
        const filtered = threeTours.filter(tour => 
            tour.name.toLowerCase().includes(lowerKeyword) || 
            tour.accommodation.toLowerCase().includes(lowerKeyword) ||
            tour.description.toLowerCase().includes(lowerKeyword)
        );
        // 重新渲染筛选后的结果（如果筛选结果为空，显示提示占位）
        const gridContainer = document.getElementById('tourGrid');
        if (filtered.length === 0) {
            gridContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding: 60px; background:#fff; border-radius: 32px;">
                <i class="fas fa-sad-tear" style="font-size: 48px; color:#aaa;"></i>
                <p style="margin-top: 16px;">没有找到匹配的旅行团，试试“云南”或“三亚”吧～</p>
            </div>`;
            return;
        }
        // 重新渲染筛选卡片（保持风格一致）
        const cardsHTML = filtered.map(tour => `
            <div class="tour-card" data-id="${tour.id}">
                <div class="card-img" style="background-image: url('${tour.image}');">
                    <div class="card-tag">${tour.tag}</div>
                </div>
                <div class="card-content">
                    <div class="card-title">
                        <span>${tour.name}</span>
                        <span class="price">¥${tour.price.toLocaleString()}<small>起</small></span>
                    </div>
                    <div class="info-row">
                        <span><i class="far fa-calendar-alt"></i> 行程时长：${tour.duration}</span>
                        <span><i class="fas fa-star" style="color:#f5b042;"></i> ${tour.rating}</span>
                    </div>
                    <div class="accommodation">
                        <i class="fas fa-hotel"></i> 住宿条件：${tour.accommodation}
                    </div>
                    <div class="info-row" style="margin-top: 6px;">
                        <span><i class="fas fa-map-marker-alt"></i> 亮点</span>
                        <span>${tour.description.substring(0, 28)}</span>
                    </div>
                    <div class="card-footer">
                        <div class="rating"><i class="fas fa-thumbs-up"></i> 满意度 98%</div>
                        <button class="btn-book">立即预订</button>
                    </div>
                </div>
            </div>
        `).join('');
        gridContainer.innerHTML = cardsHTML;
    }

    function performSearch() {
        const keyword = searchInput.value.trim();
        filterToursByKeyword(keyword);
    }
    
    if (searchBtn) {
        searchBtn.addEventListener('click', performSearch);
    }
    if (searchInput) {
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') performSearch();
        });
    }

    // 预订按钮的交互提示（模拟）
    document.addEventListener('click', (e) => {
        if (e.target.classList && e.target.classList.contains('btn-book')) {
            alert('🎉 感谢选择悠游假期！专业旅行顾问将尽快联系您，确认行程及价格详情。');
        }
    });

    // 页面启动时渲染三个旅行团 + 风景住宿区
    renderThreeTours();
    renderInspireGallery();
</script>
</body>
</html>
